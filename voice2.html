<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text-to-Voice with 20 Background Sounds</title>
<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 700px;
    margin: auto;
    background: linear-gradient(270deg, #ff6ec4, #7873f5, #42e695, #f9f871);
    background-size: 800% 800%;
    animation: gradientBG 15s ease infinite;
    color: #fff;
    border-radius: 10px;
}
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}
.container {
    background-color: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 12px;
}
textarea {
    width: 100%;
    font-size: 16px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    resize: none;
}
label { display: block; margin-top: 10px; font-weight: bold; }
input[type=range] { width: 100%; margin-top: 5px; }
button {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 16px;
    background-color: #ff9800;
    color: #000;
    border: none;
    cursor: pointer;
    border-radius: 8px;
}
button:hover { background-color: #e68900; }
#toast {
    visibility: hidden;
    min-width: 250px;
    margin-left: -125px;
    background-color: #333;
    color: #fff;
    text-align: center;
    border-radius: 8px;
    padding: 16px;
    position: fixed;
    z-index: 1;
    left: 50%;
    bottom: 30px;
    font-size: 17px;
    opacity: 0;
    transition: opacity 0.5s, bottom 0.5s;
}
#toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
}
.history {
    margin-top: 15px;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 8px;
}
.history h3 { margin-top:0; }
.history button {
    margin: 5px 5px 0 0;
    font-size: 14px;
    padding: 5px 10px;
    background-color: #4CAF50;
    color: white;
}
.history button:hover { background-color: #45a049; }
select { margin-top: 10px; padding: 8px; border-radius: 8px; border:none; font-size:16px;}
</style>
</head>
<body>

<div class="container">
<h2>Text-to-Voice Generator</h2>

<textarea id="text" rows="4" placeholder="Enter text here..."></textarea>

<label for="rate">Rate (Speed): <span id="rateValue">1</span></label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

<label for="pitch">Pitch: <span id="pitchValue">1</span></label>
<input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">

<label for="bgSelect">Select Background Music:</label>
<select id="bgSelect">
    <option value="">None</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Music 1</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Music 2</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">Music 3</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3">Music 4</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3">Music 5</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3">Music 6</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3">Music 7</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">Music 8</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3">Music 9</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3">Music 10</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3">Music 11</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3">Music 12</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3">Music 13</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3">Music 14</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3">Music 15</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3">Music 16</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3">Music 17</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-18.mp3">Music 18</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-19.mp3">Music 19</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-20.mp3">Music 20</option>
</select>

<div style="margin-top:15px;">
    <button onclick="playVoice()">Play Voice</button>
    <button onclick="downloadVoice()">Download Voice</button>
</div>

<div class="history">
<h3>History (Recent Texts)</h3>
<div id="historyList"></div>
</div>
</div>

<audio id="bgMusic" loop></audio>
<div id="toast">Voice download ho gaya!</div>

<script>
const synth = window.speechSynthesis;
const rateSlider = document.getElementById('rate');
const pitchSlider = document.getElementById('pitch');
const rateValue = document.getElementById('rateValue');
const pitchValue = document.getElementById('pitchValue');
const historyList = document.getElementById('historyList');
const bgMusic = document.getElementById('bgMusic');
const bgSelect = document.getElementById('bgSelect');

rateSlider.oninput = () => { rateValue.textContent = rateSlider.value; };
pitchSlider.oninput = () => { pitchValue.textContent = pitchSlider.value; };

let history = JSON.parse(localStorage.getItem('ttsHistory')) || [];

function updateHistory(){
    historyList.innerHTML = '';
    history.slice(-5).reverse().forEach((text)=>{
        const btnPlay = document.createElement('button');
        btnPlay.textContent = "Play";
        btnPlay.onclick = ()=>{ document.getElementById('text').value = text; playVoice(); };
        const btnDownload = document.createElement('button');
        btnDownload.textContent = "Download";
        btnDownload.onclick = ()=>{ document.getElementById('text').value = text; downloadVoice(); };
        const span = document.createElement('span');
        span.textContent = ' '+text;
        const div = document.createElement('div');
        div.appendChild(btnPlay);
        div.appendChild(btnDownload);
        div.appendChild(span);
        historyList.appendChild(div);
    });
}

function addToHistory(text){
    history.push(text);
    if(history.length>10) history.shift();
    localStorage.setItem('ttsHistory', JSON.stringify(history));
    updateHistory();
}

function playVoice(){
    const text = document.getElementById('text').value.trim();
    if(!text) return;
    if(synth.speaking) synth.cancel();
    addToHistory(text);

    const musicUrl = bgSelect.value;
    if(musicUrl){
        bgMusic.src = musicUrl;
        bgMusic.volume = 0.2;
        bgMusic.play();
    }

    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = parseFloat(rateSlider.value);
    utter.pitch = parseFloat(pitchSlider.value);
    utter.onend = ()=>{ bgMusic.pause(); bgMusic.currentTime=0; };
    synth.speak(utter);
}

function downloadVoice(){
    const text = document.getElementById('text').value.trim();
    if(!text) return alert("Please enter text!");
    addToHistory(text);

    const blob = new Blob([text], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "voice.txt"; 
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    showToast();
}

function showToast(){
    const toast = document.getElementById("toast");
    toast.className = "show";
    setTimeout(()=>{ toast.className = toast.className.replace("show",""); }, 3000);
}

updateHistory();
</script>

</body>
</html>
