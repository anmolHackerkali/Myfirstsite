<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text-to-Voice with Background Music</title>
<style>
/* Same gradient background & styling jaise pehle */
body { font-family: Arial; padding:20px; max-width:700px; margin:auto; background:linear-gradient(270deg,#ff6ec4,#7873f5,#42e695,#f9f871); background-size:800% 800%; animation:gradientBG 15s ease infinite; color:#fff; border-radius:10px;}
@keyframes gradientBG {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container {background-color: rgba(0,0,0,0.6); padding:20px; border-radius:12px;}
textarea {width:100%; font-size:16px; padding:10px; border-radius:8px; border:none; resize:none;}
button {margin-top:10px; padding:10px 20px; font-size:16px; background-color:#ff9800; color:#000; border:none; cursor:pointer; border-radius:8px;}
button:hover{background-color:#e68900;}
select{margin-top:10px;padding:8px;border-radius:8px;border:none;font-size:16px;}
#toast {visibility:hidden; min-width:250px;margin-left:-125px; background-color:#333;color:#fff;text-align:center;border-radius:8px;padding:16px;position:fixed; z-index:1; left:50%; bottom:30px;font-size:17px; opacity:0; transition: opacity 0.5s,bottom 0.5s;}
#toast.show{visibility:visible;opacity:1;bottom:50px;}
</style>
</head>
<body>
<div class="container">
<h2>Text-to-Voice Generator</h2>
<textarea id="text" rows="4" placeholder="Enter text here..."></textarea>
<label>Rate: <span id="rateValue">1</span></label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
<label>Pitch: <span id="pitchValue">1</span></label>
<input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
<label>Background Music:</label>
<select id="bgSelect">
    <option value="">None</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Music 1</option>
    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Music 2</option>
</select>
<div style="margin-top:15px;">
    <button onclick="playVoice()">Play Voice</button>
    <button onclick="downloadVoice()">Download Voice</button>
</div>
<div id="toast">Voice ready!</div>
</div>

<script>
const rateSlider = document.getElementById('rate');
const pitchSlider = document.getElementById('pitch');
const rateValue = document.getElementById('rateValue');
const pitchValue = document.getElementById('pitchValue');
const bgSelect = document.getElementById('bgSelect');

rateSlider.oninput = () => { rateValue.textContent = rateSlider.value; };
pitchSlider.oninput = () => { pitchValue.textContent = pitchSlider.value; };

// Play using SpeechSynthesis (for preview)
function playVoice(){
    const text = document.getElementById('text').value.trim();
    if(!text) return alert("Enter text!");
    const rate = parseFloat(rateSlider.value);
    const pitch = parseFloat(pitchSlider.value);
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = rate; utter.pitch = pitch;
    window.speechSynthesis.speak(utter);
}

// Download via Python backend
function downloadVoice(){
    const text = document.getElementById('text').value.trim();
    if(!text) return alert("Enter text!");
    const rate = parseFloat(rateSlider.value);
    const pitch = parseFloat(pitchSlider.value);
    const bg = bgSelect.value;

    const url = `/api/tts?text=$.           {encodeURIComponent(text)}&rate=${rate}&pitch=$. {pitch}&bg=${encodeURIComponent(bg)}`;

    const a = document.createElement('a');
    a.href = url;
    a.download = "voice.mp3";
    a.click();

    const toast = document.getElementById("toast");
    toast.className = "show";
    setTimeout(()=>{ toast.className = toast.className.replace("show",""); }, 3000);
}
</script>
</body>
</html>
