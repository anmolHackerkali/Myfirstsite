<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text-to-Voice Generator</title>

<style>
body {
    font-family: Arial;
    padding:20px;
    max-width:700px;
    margin:auto;
    background:linear-gradient(270deg,#ff6ec4,#7873f5,#42e695,#f9f871);
    background-size:800% 800%;
    animation:gradientBG 15s ease infinite;
    color:#fff;
}

@keyframes gradientBG {
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container {
    background: rgba(0,0,0,0.6);
    padding:20px;
    border-radius:10px;
}

textarea, select {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ff9800;
    cursor:pointer;
}

button:hover {
    background:#e68900;
}
</style>
</head>

<body>

<div class="container">
<h2>Text to Voice</h2>

<textarea id="text" placeholder="Enter text..."></textarea>

<label>Rate</label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

<label>Pitch</label>
<input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">

<select id="bg">
<option value="">No Music</option>
<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Music 1</option>
<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Music 2</option>
</select>

<button onclick="playVoice()">Play</button>
<button onclick="downloadVoice()">Download</button>

</div>

<script>
function playVoice(){
    const text = document.getElementById("text").value;
    const rate = document.getElementById("rate").value;
    const pitch = document.getElementById("pitch").value;

    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = rate;
    utter.pitch = pitch;

    speechSynthesis.speak(utter);
}

function downloadVoice(){
    const text = document.getElementById("text").value;
    const rate = document.getElementById("rate").value;
    const pitch = document.getElementById("pitch").value;
    const bg = document.getElementById("bg").value;

    if(!text){
        alert("Enter text first");
        return;
    }

    const url = `https://YOUR-VERCEL-URL.vercel.app/api/tts?text=${encodeURIComponent(text)}&rate=${rate}&pitch=${pitch}&bg=${encodeURIComponent(bg)}`;

    fetch(url)
    .then(res => res.blob())
    .then(blob => {
        const a = document.createElement("a");
        const urlBlob = URL.createObjectURL(blob);
        a.href = urlBlob;
        a.download = "voice.mp3";
        document.body.appendChild(a);
        a.click();
        a.remove();
    })
    .catch(() => alert("Download failed"));
}
</script>

</body>
</html>
